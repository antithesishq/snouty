name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  check-org-membership:
    runs-on: ubuntu-latest
    outputs:
      is-member: ${{ steps.check.outputs.is-member }}
    steps:
      - name: Check org membership
        id: check
        env:
          GH_TOKEN: ${{ secrets.ORG_MEMBERSHIP_TOKEN }}
        run: |
          ACTOR="${{ github.actor }}"
          if gh api "orgs/antithesishq/members/$ACTOR" --silent 2>/dev/null; then
            echo "is-member=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-member=false" >> "$GITHUB_OUTPUT"
            echo "::warning::User $ACTOR is not a member of antithesishq"
          fi

  claude-review:
    needs: check-org-membership
    if: needs.check-org-membership.outputs.is-member == 'true'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install Nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C /usr/local/bin

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model opus
            --allowed-tools Edit,Read,Write,'Bash(cargo:*)'
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
