name: Spec Maintenance

on:
  schedule:
    - cron: "0 3 * * *" # 3am UTC (7/8pm PT, 3/4am London)
  workflow_dispatch: # allow manual triggers

jobs:
  check-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits in the last 24 hours
        id: check
        run: |
          commit_count=$(git log --oneline --since="24 hours ago" origin/main | wc -l)
          echo "Commits in last 24 hours: $commit_count"
          if [ "$commit_count" -gt 0 ]; then
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_commits=false" >> "$GITHUB_OUTPUT"
          fi

  spec-check:
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Run Claude Code spec check
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-6
            --allowed-tools Read,Glob,Grep,'Bash(cargo:*)','Bash(gh issue create:*)'

          prompt: |
            Review the specs in specs/ and compare them against the actual implementation
            in the codebase. For each spec, verify that the code matches the documented
            behavior, parameters, validation rules, and error handling.

            If you find any discrepancies where the code has diverged from the specs
            (features added/removed, behavior changes, parameter changes, etc.), create
            a single GitHub issue summarizing all deltas using:

            gh issue create \
              --title "Spec maintenance: drift detected" \
              --label "maintenance" \
              --body "<your summary>"

            The issue body should include:
            - A checklist of each spec/code discrepancy found
            - For each item, note whether you think the spec or the code should be updated
            - If you're unsure which is correct, say so

            If the specs and code are in sync, do nothing — no issue needed.
