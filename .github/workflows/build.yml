name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: never
  CLICOLOR: 0
  NO_COLOR: "1"
  RUST_BACKTRACE: 1

permissions:
  contents: read
  checks: write

jobs:
  skip-check:
    runs-on: ubuntu-24.04
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf # v5
        with:
          paths_ignore: '["**.md"]'
  checks:
    runs-on: ubuntu-latest
    needs: skip-check
    if: needs.skip-check.outputs.should_skip != 'true'
    steps:
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          persist-credentials: false

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Cargo fmt
        run: cargo fmt --check

      - name: Build
        run: cargo build --all-targets

      - name: Clippy
        uses: auguwu/clippy-action@94a9ff2f6920180b89e5c03d121d0af04a9d3e03 # 1.4.0
        with:
          token: ${{secrets.GITHUB_TOKEN}}

      - name: Spell Check Repo
        uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2
  test:
    runs-on: ${{ matrix.os }}
    needs: skip-check
    if: needs.skip-check.outputs.should_skip != 'true'
    # Safety net: a wedged container op (e.g. a stuck image pull with no
    # timeout) must not hang the runner for hours. Linux finishes in ~80s and
    # macOS in well under 10m, so 20m is generous headroom.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runtime: docker
          - os: ubuntu-latest
            runtime: podman
          - os: macos-15-intel
            runtime: podman
    env:
      SNOUTY_TEST_RUNTIME: ${{ matrix.runtime }}
    steps:
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          persist-credentials: false

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Install Nextest
        uses: taiki-e/install-action@cargo-nextest

      # snouty always drives Docker Compose v2 via the `docker-compose` binary,
      # independent of the image runtime. The matrix exercises that binary
      # against both runtimes: docker on Ubuntu, and podman (which docker-compose
      # reaches over podman's API socket via DOCKER_HOST) on Ubuntu and macOS.
      # Each configure step pins the runtime and ensures `docker-compose` is on
      # PATH.
      - name: Configure Docker (Ubuntu)
        if: matrix.runtime == 'docker' && startsWith(matrix.os, 'ubuntu')
        run: |
          sudo rm -v -f "$(which podman)"
          sudo curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Configure Podman (Ubuntu)
        if: matrix.runtime == 'podman' && startsWith(matrix.os, 'ubuntu')
        run: |
          # Remove docker so snouty auto-detects podman; docker-compose then
          # reaches podman over its API socket via DOCKER_HOST.
          sudo rm -v -f "$(which docker)"
          sudo curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          systemctl --user start podman.socket

      - name: Install Podman + docker-compose (macOS)
        if: matrix.runtime == 'podman' && startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          # Size the podman machine VM to the runner: all logical cores and
          # 60% of physical memory, instead of the tiny (~2GB) default, so the
          # parallel spec run has real CPU and RAM to work with. Not 100%: the
          # VM's memory is effectively exclusive (vfkit grows into it and does
          # not hand it back), and the test harness — cargo nextest and the
          # snouty processes — runs on the host, so the host needs headroom.
          cpus=$(sysctl -n hw.ncpu)
          mem_mib=$(( $(sysctl -n hw.memsize) * 6 / 10 / 1024 / 1024 ))

          # Time each portion so we can see where setup spends its time.
          t=$SECONDS
          brew install podman docker-compose
          brew_s=$(( SECONDS - t ))

          echo "Provisioning podman machine: ${cpus} cpus, ${mem_mib} MiB memory"
          t=$SECONDS
          podman machine init --cpus "${cpus}" --memory "${mem_mib}"
          init_s=$(( SECONDS - t ))

          t=$SECONDS
          podman machine start
          start_s=$(( SECONDS - t ))

          printf '[timing] brew install: %ss | machine init: %ss | machine start: %ss\n' \
            "$brew_s" "$init_s" "$start_s"
          echo "::notice title=podman setup timing::brew install ${brew_s}s | machine init ${init_s}s | machine start ${start_s}s"

      - name: Runtime Info
        shell: bash
        run: |
          if [ "${{ matrix.runtime }}" = "docker" ]; then
            docker info
          else
            podman info
          fi
          docker-compose version

      # Cache the k8s-validator image as a tarball. `snouty validate` (k8s) does
      # a `podman run` that implicitly pulls this remote image with no timeout;
      # pulling it from Docker Hub costs ~2m and, under the parallel spec run,
      # several tests can saturate the single VM's gvproxy network proxy at once
      # and that pull wedges indefinitely. Caching the tarball turns the fetch
      # into a local `podman load` — fast and offline.
      # Bump the key's version suffix when K8S_VALIDATOR_IMAGE changes.
      - name: Cache k8s-validator image (macOS)
        if: matrix.runtime == 'podman' && startsWith(matrix.os, 'macos')
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/k8s-validator.tar
          key: k8s-validator-image-1.0.0

      - name: Load or pull k8s-validator image (macOS)
        if: matrix.runtime == 'podman' && startsWith(matrix.os, 'macos')
        run: |
          if [ -f ~/k8s-validator.tar ]; then
            echo "Loading k8s-validator from cache"
            podman load -i ~/k8s-validator.tar
          else
            echo "Pulling k8s-validator and saving for cache"
            podman pull docker.io/antithesishq/k8s-validator:1.0.0
            podman save docker.io/antithesishq/k8s-validator:1.0.0 -o ~/k8s-validator.tar
          fi

      - name: Test
        run: cargo nextest run
  tests-passed:
    runs-on: ubuntu-latest
    needs:
      - skip-check
      - test
      - build-nix
    if: always()
    steps:
      - name: Verify test matrix
        run: |
          if [ "${{ needs.skip-check.outputs.should_skip }}" = "true" ]; then
            exit 0
          fi

          if [ "${{ needs.test.result }}" = "success" ]; then
            if [ "${{ needs.build-nix.result }}" = "success" ]; then
              exit 0
            fi
          fi

          echo "test matrix result: ${{ needs.test.result }}"
          echo "build-nix result: ${{ needs.build-nix.result }}"
          exit 1
  build-nix:
    runs-on: ubuntu-latest
    needs: skip-check
    if: needs.skip-check.outputs.should_skip != 'true'
    steps:
      - uses: samueldr/lix-gha-installer-action@7b7f14d320d6aacfb65bd1ef761566b3b69e474c # v2026-02-22

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          persist-credentials: false

      - name: Start Podman socket # required for docker-compose
        run: |
          systemctl --user start podman.socket

      - name: Test
        run: nix-shell --run "cargo nextest run"
